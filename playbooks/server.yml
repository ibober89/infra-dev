- import_playbook: /opt/velveta/infra-dev/playbooks/bootstrap.yml

- name: Converge the Velveta dev server baseline
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

  tasks:
    - name: Ensure baseline OS packages are installed
      ansible.builtin.apt:
        name:
          - git
          - curl
          - rsync
          - acl
          - unzip
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure admin user exists
      ansible.builtin.user:
        name: "{{ velveta_users.admin }}"
        shell: /bin/bash
        state: present

    - name: Ensure frontend user exists
      ansible.builtin.user:
        name: "{{ velveta_users.frontend_dev }}"
        shell: /bin/bash
        groups:
          - docker
        append: true
        state: present

    - name: Ensure ERP dev user exists
      ansible.builtin.user:
        name: "{{ velveta_users.erp_dev }}"
        shell: /bin/bash
        groups:
          - docker
        append: true
        state: present

    - name: Ensure runner user exists
      ansible.builtin.user:
        name: "{{ velveta_users.runner }}"
        shell: /bin/bash
        groups:
          - docker
          - "{{ velveta_users.frontend_dev }}"
          - "{{ velveta_users.erp_dev }}"
        append: true
        state: present

    - name: Ensure dev project directories use the current ownership model
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ velveta_paths.dev_root }}"
          owner: "{{ velveta_users.frontend_dev }}"
          group: "{{ velveta_users.frontend_dev }}"
          mode: "0755"
        - path: "{{ velveta_paths.dev_frappe_root }}"
          owner: "{{ velveta_users.frontend_dev }}"
          group: "{{ velveta_users.erp_dev }}"
          mode: "2775"
        - path: "{{ velveta_paths.dev_nextjs_root }}"
          owner: "{{ velveta_users.frontend_dev }}"
          group: "{{ velveta_users.frontend_dev }}"
          mode: "2775"
        - path: "{{ velveta_paths.nginx_root }}"
          owner: "{{ velveta_users.admin }}"
          group: "{{ velveta_users.admin }}"
          mode: "0755"
        - path: "{{ velveta_paths.runner_ecommerce_root }}"
          owner: "{{ velveta_users.runner }}"
          group: "{{ velveta_users.runner }}"
          mode: "0755"
        - path: "{{ velveta_paths.runner_frontendx_root }}"
          owner: "{{ velveta_users.runner }}"
          group: "{{ velveta_users.runner }}"
          mode: "0755"
        - path: "{{ velveta_paths.secrets_root }}"
          owner: root
          group: root
          mode: "0700"

    - name: Deploy Docker installer helper
      ansible.builtin.copy:
        src: "{{ velveta_paths.infra_root }}/scripts/install-docker.sh"
        dest: "{{ velveta_paths.infra_root }}/scripts/install-docker.sh"
        mode: "0755"

    - name: Check whether GitHub runner PAT file exists
      ansible.builtin.stat:
        path: "{{ velveta_runner.github_pat_file }}"
      register: velveta_runner_pat_file

    - name: Stop when GitHub runner PAT file is missing
      ansible.builtin.assert:
        that:
          - velveta_runner_pat_file.stat.exists
        fail_msg: "Missing GitHub runner PAT file at {{ velveta_runner.github_pat_file }}"

    - name: Read GitHub runner PAT
      ansible.builtin.slurp:
        src: "{{ velveta_runner.github_pat_file }}"
      register: velveta_runner_pat
      no_log: true

    - name: Derive GitHub runner package architecture
      ansible.builtin.set_fact:
        velveta_runner_package_arch: "{{ velveta_runner.package_arch_map[ansible_architecture] | default(ansible_architecture) }}"

    - name: Download GitHub Actions runner bundles
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ velveta_runner.version }}/actions-runner-linux-{{ velveta_runner_package_arch }}-{{ velveta_runner.version }}.tar.gz"
        dest: "/tmp/actions-runner-linux-{{ velveta_runner_package_arch }}-{{ velveta_runner.version }}.tar.gz"
        mode: "0644"

    - name: Check whether runner configuration already exists
      ansible.builtin.stat:
        path: "{{ item.working_directory }}/.runner"
      loop: "{{ velveta_runner_services }}"
      register: velveta_runner_configs

    - name: Unpack GitHub runner bundle into each runner directory
      ansible.builtin.unarchive:
        src: "/tmp/actions-runner-linux-{{ velveta_runner_package_arch }}-{{ velveta_runner.version }}.tar.gz"
        dest: "{{ item.item.working_directory }}"
        remote_src: true
        owner: "{{ velveta_users.runner }}"
        group: "{{ velveta_users.runner }}"
      loop: "{{ velveta_runner_configs.results }}"
      when: not item.stat.exists

    - name: Request GitHub runner registration tokens
      ansible.builtin.uri:
        url: "{{ velveta_runner.github_api_base }}/repos/{{ item.item.github_owner }}/{{ item.item.github_repo }}/actions/runners/registration-token"
        method: POST
        headers:
          Accept: application/vnd.github+json
          Authorization: "Bearer {{ velveta_runner_pat.content | b64decode | trim }}"
          X-GitHub-Api-Version: "2022-11-28"
        status_code: 201
        return_content: true
      loop: "{{ velveta_runner_configs.results }}"
      when: not item.stat.exists
      register: velveta_runner_registration_tokens
      no_log: true

    - name: Configure GitHub runners
      become_user: "{{ velveta_users.runner }}"
      ansible.builtin.shell: |
        ./config.sh \
          --url https://github.com/{{ item.item.github_owner }}/{{ item.item.github_repo }} \
          --token {{ item.json.token }} \
          --name {{ item.item.runner_name }} \
          --labels {{ item.item.runner_labels }} \
          --work _work \
          --unattended \
          --replace
      args:
        chdir: "{{ item.item.working_directory }}"
        executable: /bin/bash
      loop: "{{ velveta_runner_registration_tokens.results }}"
      when: not item.item.stat.exists
      no_log: true

    - name: Check whether runner service executables exist
      ansible.builtin.stat:
        path: "{{ item.working_directory }}/runsvc.sh"
      loop: "{{ velveta_runner_services }}"
      register: velveta_runner_execs

    - name: Deploy runner systemd service units when runner files exist
      ansible.builtin.template:
        src: "{{ velveta_paths.infra_root }}/templates/actions-runner.service.j2"
        dest: "/etc/systemd/system/{{ item.item.name }}"
        mode: "0644"
      loop: "{{ velveta_runner_execs.results }}"
      when: item.stat.exists
      notify: Reload systemd

    - name: Flush systemd handlers before enabling units
      ansible.builtin.meta: flush_handlers

    - name: Ensure runner services stay enabled when present
      ansible.builtin.systemd:
        name: "{{ item.item.name }}"
        enabled: true
        state: started
      loop: "{{ velveta_runner_execs.results }}"
      when: item.stat.exists

    - name: Ensure git safe directories are configured for dev repos
      become_user: "{{ item.user }}"
      ansible.builtin.shell: |
        git config --global --get-all safe.directory | grep -Fx "{{ item.path }}" >/dev/null || \
        git config --global --add safe.directory "{{ item.path }}"
      args:
        executable: /bin/bash
      loop:
        - user: erpdev
          path: /opt/velveta/dev/frappe-bench/apps/ecommerce
        - user: frontend
          path: /opt/velveta/dev/nextjs
        - user: github-runner
          path: /opt/velveta/dev/frappe-bench/apps/ecommerce
        - user: github-runner
          path: /opt/velveta/dev/nextjs
      changed_when: false
